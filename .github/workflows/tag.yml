name: Deploy to production

on:
  push:
    tags:
      - '*'  # Triggers on any tag creation
      
  workflow_dispatch:

jobs:
  # ensure that only main branch tags are deployed to production
  check-tag-origin:
    runs-on: ubuntu-latest
    outputs:
      is_main: ${{ steps.check_branch.outputs.is_main }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Get Tag Source Branch
        id: check_branch
        run: |
          set -x
          git checkout main
          git pull
          TAG_SHA=$(git rev-list -n 1 ${{ github.ref }})
          if git merge-base --is-ancestor "$TAG_SHA" main; then
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi
  docker-hub-publish:
    needs: check-tag-origin
    if: needs.check-tag-origin.outputs.is_main == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Extract tag name
        id: extract_tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@v3.6.0
        with:
          username: ssvlabs
          password: ${{ secrets.SSV_ORACLE_DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.extract_tag.outputs.tag }}
            GIT_COMMIT=${{ github.sha }}
          tags: |
            docker.io/ssvlabs/ssv-oracle:latest
            docker.io/ssvlabs/ssv-oracle:${{ steps.extract_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
