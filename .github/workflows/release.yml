name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"

      - name: Run tests
        run: go test ./...

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ssvlabs
          password: ${{ secrets.SSV_ORACLE_DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ssvlabs/ssv-oracle:${{ github.ref_name }}
            ssvlabs/ssv-oracle:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
